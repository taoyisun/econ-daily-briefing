# 关键词相关性打分(无 AI 时的兜底;有 AI 时作为初筛)
relevance_topics:
  gambling:
    label: "赌博/博彩"
    level: high
    keywords: [gambling, casino, lottery, "sports betting", wager, "video poker",
               "slot machine", "problem gambl", bettor, gaming machine]
  bankruptcy:
    label: "破产/家庭财务"
    level: high
    keywords: [bankruptcy, insolven, "consumer credit", "household debt", "credit card debt",
               "financial distress", payday, foreclosure, delinquen, "debt relief", garnish]
  public:
    label: "公共经济"
    level: medium
    keywords: [taxation, "tax policy", "income tax", "sales tax", "public goods", "welfare program",
               medicaid, "food stamp", SNAP, EITC, "transfer program", "social insurance", "sin tax"]
  urban:
    label: "城市/区域"
    level: medium
    keywords: [housing, urban, neighborhood, zoning, "local government", "property tax",
               "spatial", commut, gentrif]
  entry:
    label: "企业进入/空间竞争"
    level: high
    keywords: ["firm entry", "market entry", "entry model", "entry and exit", "entry decision",
               "product positioning", "spatial competition", "location choice", "spatial differentiation",
               "discrete game", "entry game", "incomplete information game", "market structure"]
  methods:
    label: "因果推断方法"
    level: medium
    keywords: ["difference-in-differences", "difference in differences", "event study",
               "synthetic control", "regression discontinuity", "staggered adoption",
               "two-way fixed effects", "instrumental variable"]
