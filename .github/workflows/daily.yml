name: Daily briefing

on:
  schedule:
    - cron: "0 11 * * *"   # 每天 UTC 11:00 ≈ 美东早上 6-7 点
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_AI_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests feedparser pyyaml

      - name: Fetch and build data
        run: python scripts/build.py

      - name: AI enrich (可选 — 需要 CLAUDE_CODE_OAUTH_TOKEN secret)
        if: ${{ env.HAS_AI_TOKEN == 'true' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          python scripts/ai_enrich.py

      - name: Commit and push
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "data: $(date -u +%F)"
          git push
